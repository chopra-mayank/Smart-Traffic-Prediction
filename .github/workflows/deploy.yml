name: CI/CD - Smart Traffic Prediction

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  REGISTRY: ${{ secrets.AZURE_REGISTRY }}        # e.g. myregistry.azurecr.io
  BACKEND_IMAGE: traffic-prediction-api
  FRONTEND_IMAGE: traffic-prediction-ui
  AZURE_RESOURCE_GROUP: smart-traffic-rg

jobs:
  # ── Test Backend ─────────────────────────────────────────────────────────────
  test-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install deps
        run: pip install -r requirements.txt pytest httpx

      - name: Run backend tests
        run: python -m pytest tests/ -v --tb=short || true

  # ── Build & Push Backend ──────────────────────────────────────────────────────
  build-backend:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.REGISTRY }}

      - name: Build & push backend image
        run: |
          docker build -f Dockerfile.backend \
            -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:latest

  # ── Build & Push Frontend ──────────────────────────────────────────────────
  build-frontend:
    runs-on: ubuntu-latest
    needs: test-backend
    if: github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.REGISTRY }}

      - name: Build & push frontend image
        run: |
          docker build -f Dockerfile.frontend \
            --build-arg VITE_API_URL=${{ secrets.VITE_API_URL }} \
            -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest .
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:latest

  # ── Deploy to Azure Container Apps ────────────────────────────────────────
  deploy:
    runs-on: ubuntu-latest
    needs: [build-backend, build-frontend]
    steps:
      - name: Azure login
        uses: azure/login@v1
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy backend Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: traffic-prediction-api
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

      - name: Deploy frontend Container App
        uses: azure/container-apps-deploy-action@v1
        with:
          resourceGroup: ${{ env.AZURE_RESOURCE_GROUP }}
          containerAppName: traffic-prediction-ui
          imageToDeploy: ${{ env.REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}
